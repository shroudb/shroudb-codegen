[server]
tcp_bind = "127.0.0.1:{{PORT}}"
http_bind = "127.0.0.1:{{HTTP_PORT}}"

[store]
data_dir = "{{DATA_DIR}}"

# Sandbox-only: chronicle's engine layer enforces `require_policy` in
# production (default true) to refuse Disabled capability. The sandbox
# opts out explicitly. See test-cipher-config.toml for the broader
# "SDK wire-compatibility, not production posture" rationale.
[engine]
max_events = 10000
max_age_days = 1
require_policy = false

[policy]
mode = "disabled"
justification = "sandbox: SDK wire-compatibility test, not production posture"
