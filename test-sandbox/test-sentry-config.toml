[server]
tcp_bind = "127.0.0.1:{{PORT}}"

[storage]
data_dir = "{{DATA_DIR}}"

[engine]
signing_algorithm = "ES256"

[policies.test-permit]
effect = "allow"
description = "Test policy: admin can read documents"
priority = 100
principal_roles = ["admin"]
resource_type = "document"
action_names = ["read"]
