[server]
tcp_bind = "127.0.0.1:{{PORT}}"

[storage]
data_dir = "{{DATA_DIR}}"

[cas.test-ca]
algorithm = "ecdsa-p256"
subject = "CN=Test CA,O=ShrouDB Test"
ttl_days = 365

[profiles.server]
key_usage = ["DigitalSignature", "KeyEncipherment"]
extended_key_usage = ["ServerAuth"]
max_ttl_days = 90
default_ttl = "24h"
allow_san_dns = true
allow_san_ip = true
