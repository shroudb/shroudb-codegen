# Sandbox-only — courier's engine-level policy_mode must be "open" so
# check_policy short-circuits when the capability is Disabled. Root-level
# key, must precede any `[section]` header. See test-cipher-config.toml
# for the broader sandbox rationale.
policy_mode = "open"

[server]
tcp_bind = "127.0.0.1:{{PORT}}"

[store]
data_dir = "{{DATA_DIR}}"

[audit]
mode = "disabled"
justification = "sandbox: SDK wire-compatibility test, not production posture"

[policy]
mode = "disabled"
justification = "sandbox: SDK wire-compatibility test, not production posture"
