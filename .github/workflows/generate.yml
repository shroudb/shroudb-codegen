name: Generate SDKs

on:
  repository_dispatch:
    types: [engine-release]
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to generate (e.g., 1.4.0). Leave empty for dev build."
        required: false
        default: ""

permissions:
  contents: read

env:
  CODEGEN_BIN: ./target/release/shroudb-codegen

jobs:
  generate:
    name: Generate SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build codegen
        run: cargo build --release

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone engine repos
        run: |
          cd ..
          for repo in shroudb shroudb-cipher shroudb-sigil shroudb-forge shroudb-sentry \
                      shroudb-keep shroudb-courier shroudb-chronicle shroudb-veil shroudb-stash shroudb-moat; do
            gh repo clone "shroudb/$repo" -- --depth 1 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Generate unified SDKs
        run: |
          $CODEGEN_BIN --spec ../shroudb-moat/protocol.toml --lang all --output generated/

      - name: Generate Sigil HTTP SDK
        run: |
          $CODEGEN_BIN --spec ../shroudb-sigil/protocol.toml --lang all --output generated-http/ --http

      # ── Update SDK repos ───────────────────────────────────────────

      - name: Push to shroudb-sdk-typescript
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/shroudb/shroudb-sdk-typescript.git" /tmp/sdk-ts
          # Preserve .git and .github, replace everything else
          find /tmp/sdk-ts -mindepth 1 -not -path '*/.git/*' -not -name '.git' -not -path '*/.github/*' -not -name '.github' -delete
          cp -r generated/typescript/* /tmp/sdk-ts/
          cd /tmp/sdk-ts
          # Patch version
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          git config user.name "shroudb-codegen[bot]"
          git config user.email "codegen@shroudb.dev"
          git add -A
          git diff --staged --quiet || {
            git commit -m "Generate SDK v${VERSION}"
            git tag "v${VERSION}" 2>/dev/null || true
            git push && git push --tags 2>/dev/null || true
          }
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Push to shroudb-sdk-python
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/shroudb/shroudb-sdk-python.git" /tmp/sdk-py
          find /tmp/sdk-py -mindepth 1 -not -path '*/.git/*' -not -name '.git' -not -path '*/.github/*' -not -name '.github' -delete
          cp -r generated/python/* /tmp/sdk-py/
          cd /tmp/sdk-py
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          git config user.name "shroudb-codegen[bot]"
          git config user.email "codegen@shroudb.dev"
          git add -A
          git diff --staged --quiet || {
            git commit -m "Generate SDK v${VERSION}"
            git tag "v${VERSION}" 2>/dev/null || true
            git push && git push --tags 2>/dev/null || true
          }
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Push to shroudb-sdk-go
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/shroudb/shroudb-sdk-go.git" /tmp/sdk-go
          find /tmp/sdk-go -mindepth 1 -not -path '*/.git/*' -not -name '.git' -not -path '*/.github/*' -not -name '.github' -delete
          cp -r generated/go/* /tmp/sdk-go/
          cd /tmp/sdk-go
          git config user.name "shroudb-codegen[bot]"
          git config user.email "codegen@shroudb.dev"
          git add -A
          git diff --staged --quiet || {
            git commit -m "Generate SDK v${VERSION}"
            git tag "v${VERSION}" 2>/dev/null || true
            git push && git push --tags 2>/dev/null || true
          }
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Push to shroudb-sdk-ruby
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/shroudb/shroudb-sdk-ruby.git" /tmp/sdk-rb
          find /tmp/sdk-rb -mindepth 1 -not -path '*/.git/*' -not -name '.git' -not -path '*/.github/*' -not -name '.github' -delete
          cp -r generated/ruby/* /tmp/sdk-rb/
          cd /tmp/sdk-rb
          sed -i "s/s.version = \".*\"/s.version = \"$VERSION\"/" shroudb.gemspec
          git config user.name "shroudb-codegen[bot]"
          git config user.email "codegen@shroudb.dev"
          git add -A
          git diff --staged --quiet || {
            git commit -m "Generate SDK v${VERSION}"
            git tag "v${VERSION}" 2>/dev/null || true
            git push && git push --tags 2>/dev/null || true
          }
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      # Publishing is handled by each SDK repo's own workflow, triggered
      # by the tag push above. See .github/workflows/publish.yml in each
      # shroudb-sdk-* repository.
