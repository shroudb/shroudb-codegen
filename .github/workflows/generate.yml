name: Generate SDKs

on:
  repository_dispatch:
    types: [engine-release]
  workflow_dispatch:
    inputs:
      engine:
        description: "Engine name (vault, transit, auth, mint, sentry, keep, courier, pulse, all)"
        required: true
        default: "all"
      publish:
        description: "Publish packages to registries"
        type: boolean
        default: true

env:
  CODEGEN_BIN: ./target/release/shroudb-codegen

jobs:
  generate:
    name: Generate and publish SDKs
    runs-on: [self-hosted, railway]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: |
          export CARGO_HOME="/tmp/cargo-${{ github.run_id }}"
          export RUSTUP_HOME="/tmp/rustup-${{ github.run_id }}"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
        env:
          CARGO_HOME: /tmp/cargo-${{ github.run_id }}
          RUSTUP_HOME: /tmp/rustup-${{ github.run_id }}

      - name: Build codegen
        run: cargo build --release
        env:
          CARGO_HOME: /tmp/cargo-${{ github.run_id }}
          RUSTUP_HOME: /tmp/rustup-${{ github.run_id }}

      - name: Determine engine
        id: engine
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "engine=${{ github.event.client_payload.engine }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "engine=${{ github.event.inputs.engine }}" >> "$GITHUB_OUTPUT"
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone protocol specs
        run: |
          mkdir -p specs
          for repo in shroudb shroudb-transit shroudb-auth shroudb-mint shroudb-sentry shroudb-keep shroudb-courier shroudb-pulse; do
            if [ -f "../$repo/protocol.toml" ]; then
              cp "../$repo/protocol.toml" "specs/$repo.toml"
            else
              gh api "repos/shroudb/$repo/contents/protocol.toml" --jq '.content' | base64 -d > "specs/$repo.toml" 2>/dev/null || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Generate SDKs
        run: |
          ENGINE="${{ steps.engine.outputs.engine }}"

          generate_engine() {
            local spec="$1"
            local name="$2"
            if [ -f "$spec" ] && [ -s "$spec" ]; then
              for lang in python typescript go ruby; do
                $CODEGEN_BIN --spec "$spec" --lang "$lang" --output "generated/$lang/$name" 2>&1
              done
            fi
          }

          rm -rf generated/

          if [ "$ENGINE" = "all" ]; then
            generate_engine specs/shroudb.toml shroudb
            generate_engine specs/shroudb-transit.toml shroudb-transit
            generate_engine specs/shroudb-auth.toml shroudb-auth
            generate_engine specs/shroudb-mint.toml shroudb-mint
            generate_engine specs/shroudb-sentry.toml shroudb-sentry
            generate_engine specs/shroudb-keep.toml shroudb-keep
            generate_engine specs/shroudb-courier.toml shroudb-courier
            generate_engine specs/shroudb-pulse.toml shroudb-pulse
          else
            SPEC_NAME="shroudb"
            [ "$ENGINE" != "vault" ] && SPEC_NAME="shroudb-$ENGINE"
            generate_engine "specs/$SPEC_NAME.toml" "$SPEC_NAME"
          fi

      - name: Update SDK repos
        run: |
          VERSION="${{ steps.engine.outputs.version }}"

          update_sdk_repo() {
            local lang="$1"
            local repo="shroudb-sdk-$lang"

            echo "Updating $repo..."
            git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/shroudb/$repo.git" "/tmp/$repo" 2>/dev/null || return 0

            cp -r generated/$lang/* "/tmp/$repo/" 2>/dev/null || true

            cd "/tmp/$repo"
            git config user.name "shroudb-codegen[bot]"
            git config user.email "codegen@shroudb.dev"

            if git diff --quiet && git diff --staged --quiet; then
              echo "  No changes for $repo"
            else
              git add -A
              git commit -m "Update SDK: engine=${{ steps.engine.outputs.engine }} version=$VERSION"
              git tag "v$VERSION" 2>/dev/null || true
              git push
              git push --tags 2>/dev/null || true
              echo "  Pushed updates to $repo"
            fi
            cd -
          }

          for lang in python typescript go ruby; do
            update_sdk_repo "$lang"
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      # ─── Publish packages to registries ────────────────────────────
      # Set these org secrets when ready:
      #   NPM_TOKEN       — npm access token for @shroudb scope
      #   PYPI_TOKEN       — PyPI API token (or private index token)
      #   RUBYGEMS_API_KEY — RubyGems API key

      - name: Publish Python SDK
        if: steps.engine.outputs.version != 'dev'
        run: |
          VERSION="${{ steps.engine.outputs.version }}"
          cd /tmp/shroudb-sdk-python

          # Patch version in pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml 2>/dev/null || \
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

          pip install --quiet build twine 2>/dev/null || pip3 install --quiet build twine
          python -m build 2>/dev/null || python3 -m build
          twine upload dist/* --non-interactive || echo "  Python publish skipped (no PYPI_TOKEN or already published)"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        continue-on-error: true

      - name: Publish TypeScript SDK
        if: steps.engine.outputs.version != 'dev'
        run: |
          VERSION="${{ steps.engine.outputs.version }}"
          cd /tmp/shroudb-sdk-typescript

          # Patch version in package.json
          if command -v node &>/dev/null; then
            node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
            npm publish --access restricted || echo "  TypeScript publish skipped (no NPM_TOKEN or already published)"
          else
            echo "  Node.js not available, skipping TypeScript publish"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish Ruby SDK
        if: steps.engine.outputs.version != 'dev'
        run: |
          VERSION="${{ steps.engine.outputs.version }}"
          cd /tmp/shroudb-sdk-ruby

          # Patch version in gemspec
          sed -i "s/s.version = \".*\"/s.version = \"$VERSION\"/" shroudb.gemspec 2>/dev/null || \
            sed -i '' "s/s.version = \".*\"/s.version = \"$VERSION\"/" shroudb.gemspec

          if command -v gem &>/dev/null; then
            gem build shroudb.gemspec
            gem push shroudb-${VERSION}.gem || echo "  Ruby publish skipped (no RUBYGEMS_API_KEY or already published)"
          else
            echo "  Ruby not available, skipping Ruby publish"
          fi
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        continue-on-error: true

      - name: Tag Go SDK
        if: steps.engine.outputs.version != 'dev'
        run: |
          VERSION="${{ steps.engine.outputs.version }}"
          cd /tmp/shroudb-sdk-go

          # Go modules are published by tagging the repo — no registry push needed.
          # The tag was already pushed in the "Update SDK repos" step.
          # Users install with: go get github.com/shroudb/shroudb-sdk-go@v$VERSION
          echo "  Go SDK tagged v$VERSION (published via git tag)"
        continue-on-error: true
